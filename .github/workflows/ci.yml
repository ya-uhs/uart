name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/UART/UART.csproj

      - name: Build
        run: dotnet build src/UART/UART.csproj --no-restore -c Release

      - name: Format check (lint)
        run: dotnet format src/UART/UART.csproj --verify-no-changes --severity warn

      - name: Vulnerability check
        run: |
          dotnet list src/UART/UART.csproj package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "::error::Vulnerable packages detected"
            cat vuln.txt
            exit 1
          fi
